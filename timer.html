<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Speed Timer</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
               font-family: system-ui, sans-serif; overflow: hidden; }
  #stage { position: relative; width: 100vw; height: 100dvh; }
  #cam { display: none; }
  #view { position: absolute; inset: 0; width: 100%; height: 100%;
          object-fit: contain; touch-action: none; }
  #hud { position: absolute; top: 0; left: 0; right: 0; display: flex;
         justify-content: space-between; align-items: center; padding: 10px 14px;
         pointer-events: none; }
  #state { font-size: 15px; font-weight: 600; letter-spacing: .08em;
           color: #ffd60a; text-shadow: 0 1px 4px #000; }
  #clock { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13vw;
           line-height: 1; text-shadow: 0 2px 8px #000; }
  #clock.running { color: #30d158; }
  #clock.done { color: #ff453a; }
  #bar { position: absolute; bottom: 0; left: 0; right: 0; display: flex;
         gap: 10px; padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
  button { flex: 1; padding: 14px 0; font-size: 16px; font-weight: 600;
           border: 0; border-radius: 12px; background: #ffffff22; color: #fff; }
  button:active { background: #ffffff44; }
  #msg { position: absolute; bottom: 84px; left: 0; right: 0; text-align: center;
         font-size: 15px; color: #ddd; text-shadow: 0 1px 4px #000;
         pointer-events: none; padding: 0 20px; }
</style>

<div id="stage">
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="view"></canvas>
  <div id="hud"><span id="state">LOADING…</span><span id="clock">0.00</span></div>
  <div id="msg">Loading pose model…</div>
  <div id="bar">
    <button id="reset">Reset</button>
    <button id="flip">Flip camera</button>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const cam = document.getElementById("cam");
const view = document.getElementById("view");
const ctx = view.getContext("2d");
const clockEl = document.getElementById("clock");
const stateEl = document.getElementById("state");
const msgEl = document.getElementById("msg");

// MediaPipe pose landmark indices: wrists and index fingertips
const HAND_POINTS = [15, 16, 19, 20];

let landmarker, drawer;
let facing = "environment";
let holds = [];          // [{x,y} start, {x,y} finish] in video pixels
let state = "PLACE";     // PLACE -> WAITING -> READY -> CLIMBING -> FINISHED
let tStart = 0, tFinal = 0;

const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, ms) {
  const o = audio.createOscillator(), g = audio.createGain();
  o.frequency.value = freq; o.connect(g); g.connect(audio.destination);
  g.gain.value = 0.3; o.start(); o.stop(audio.currentTime + ms / 1000);
}

async function startCamera() {
  if (cam.srcObject) cam.srcObject.getTracks().forEach(t => t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: 1280 } }, audio: false });
  cam.srcObject = stream;
  await new Promise(r => cam.onloadedmetadata = r);
  view.width = cam.videoWidth;
  view.height = cam.videoHeight;
}

function holdRadius() { return Math.min(view.width, view.height) * 0.07; }
function near(p, hold) {
  const r = holdRadius();
  return (p.x - hold.x) ** 2 + (p.y - hold.y) ** 2 < r * r;
}

function setState(s) {
  state = s;
  stateEl.textContent = {
    PLACE: holds.length === 0 ? "TAP THE START HOLD" : "TAP THE FINISH HOLD",
    WAITING: "HAND ON START HOLD…", READY: "READY — GO WHEN YOU WANT",
    CLIMBING: "CLIMBING", FINISHED: "FINISHED",
  }[s];
  msgEl.textContent = "";
}

view.addEventListener("pointerdown", e => {
  if (holds.length >= 2) return;
  if (audio.state === "suspended") audio.resume();  // unlock sound on iOS
  const r = view.getBoundingClientRect();
  // object-fit: contain — find the letterboxed video box inside the element
  const scale = Math.min(r.width / view.width, r.height / view.height);
  const ox = (r.width - view.width * scale) / 2;
  const oy = (r.height - view.height * scale) / 2;
  const x = (e.clientX - r.left - ox) / scale;
  const y = (e.clientY - r.top - oy) / scale;
  if (x < 0 || y < 0 || x > view.width || y > view.height) return;
  holds.push({ x, y });
  setState(holds.length < 2 ? "PLACE" : "WAITING");
});

document.getElementById("reset").onclick = () => {
  holds = []; tStart = tFinal = 0;
  clockEl.textContent = "0.00"; clockEl.className = "";
  setState("PLACE");
};
document.getElementById("flip").onclick = async () => {
  facing = facing === "environment" ? "user" : "environment";
  await startCamera();
  document.getElementById("reset").onclick();
};

function tick(now) {
  requestAnimationFrame(tick);
  if (!landmarker || cam.readyState < 2) return;

  const res = landmarker.detectForVideo(cam, now);
  ctx.drawImage(cam, 0, 0, view.width, view.height);

  const hands = [];
  for (const lm of res.landmarks ?? []) {
    drawer.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS,
                          { color: "#30d158", lineWidth: 3 });
    for (const i of HAND_POINTS)
      if (lm[i]) hands.push({ x: lm[i].x * view.width, y: lm[i].y * view.height });
  }
  for (const p of hands) {
    ctx.fillStyle = "#ffd60a";
    ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill();
  }

  if (holds.length === 2) {
    if (state === "WAITING" && hands.some(p => near(p, holds[0]))) {
      setState("READY"); beep(440, 120);
    } else if (state === "READY" && !hands.some(p => near(p, holds[0]))) {
      setState("CLIMBING"); tStart = now; beep(880, 150);
      clockEl.className = "running";
    } else if (state === "CLIMBING" && hands.some(p => near(p, holds[1]))) {
      setState("FINISHED"); tFinal = (now - tStart) / 1000;
      clockEl.className = "done"; beep(1200, 120); setTimeout(() => beep(1200, 200), 180);
    }
  }

  holds.forEach((h, i) => {
    ctx.strokeStyle = i === 0 ? "#30d158" : "#ff453a";
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(h.x, h.y, holdRadius(), 0, 7); ctx.stroke();
    ctx.fillStyle = ctx.strokeStyle;
    ctx.font = "bold 22px system-ui";
    ctx.fillText(i === 0 ? "START" : "FINISH", h.x - 34, h.y - holdRadius() - 10);
  });

  if (state === "CLIMBING") clockEl.textContent = ((now - tStart) / 1000).toFixed(2);
  else if (state === "FINISHED") clockEl.textContent = tFinal.toFixed(2);
}

try {
  await startCamera();
  msgEl.textContent = "Camera OK. Loading pose model…";
  const files = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker = await PoseLandmarker.createFromOptions(files, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO", numPoses: 1,
  });
  drawer = new DrawingUtils(ctx);
  setState("PLACE");
  try { await navigator.wakeLock.request("screen"); } catch {}
  requestAnimationFrame(tick);
} catch (err) {
  stateEl.textContent = "ERROR";
  msgEl.textContent = err.name === "NotAllowedError"
    ? "Camera permission denied — allow it in browser settings and reload."
    : "Failed to start: " + err.message;
}
</script>
